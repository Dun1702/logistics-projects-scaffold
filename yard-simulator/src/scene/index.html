<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Yard Simulator — 3D Container Yard</title>
<style>
  body { margin: 0; overflow: hidden; background: #0b0d10; font-family: 'Courier New', monospace; }
  #hud {
    position: absolute; top: 16px; left: 16px; color: #7fffb0;
    font-size: 12px; background: rgba(10,14,12,0.7); padding: 12px 16px;
    border: 1px solid #1e3a2a; border-radius: 4px; line-height: 1.6;
  }
  #hud b { color: #d4ffde; }
  canvas { display: block; }
  #yard-fallback { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="hud">
  <b>YARD SIMULATOR</b><br>
  Containers: <span id="stat-count">-</span><br>
  Reshuffles: <span id="stat-reshuffle">-</span><br>
  <span style="color:#4a6b56">Kéo chuột để xoay · Cuộn để zoom</span>
</div>
<canvas id="yard-fallback"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ---- Dữ liệu mẫu: kết quả từ planYardSlotting() ----
const yardSpec = { blocks: 2, baysPerBlock: 3, rowsPerBay: 2, tiersPerStack: 3 };
const placements = [
  { containerId: 'C1', block: 0, bay: 0, row: 0, tier: 0 },
  { containerId: 'C5', block: 0, bay: 0, row: 1, tier: 0 },
  { containerId: 'C3', block: 0, bay: 1, row: 0, tier: 0 },
  { containerId: 'C2', block: 0, bay: 1, row: 1, tier: 0 },
  { containerId: 'C4', block: 0, bay: 2, row: 0, tier: 0 },
];

document.getElementById('stat-count').textContent = placements.length;
document.getElementById('stat-reshuffle').textContent = '0';

if (window.THREE) {
  runThreeScene();
} else {
  drawFallbackScene();
}

function runThreeScene() {
document.getElementById('yard-fallback').style.display = 'none';

// ---- Setup scene ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d10);
scene.fog = new THREE.Fog(0x0b0d10, 30, 90);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(18, 16, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

let yaw = 0.72;
let pitch = 0.52;
let distance = 30;
let dragging = false;
let lastMouse = { x: 0, y: 0 };
const target = new THREE.Vector3(6, 1, 3);

function updateCamera() {
  const x = target.x + Math.cos(yaw) * Math.cos(pitch) * distance;
  const y = target.y + Math.sin(pitch) * distance;
  const z = target.z + Math.sin(yaw) * Math.cos(pitch) * distance;
  camera.position.set(x, y, z);
  camera.lookAt(target);
}

renderer.domElement.addEventListener('pointerdown', event => {
  dragging = true;
  lastMouse = { x: event.clientX, y: event.clientY };
});
renderer.domElement.addEventListener('pointerup', () => { dragging = false; });
renderer.domElement.addEventListener('pointerleave', () => { dragging = false; });
renderer.domElement.addEventListener('pointermove', event => {
  if (!dragging) return;
  yaw -= (event.clientX - lastMouse.x) * 0.008;
  pitch = Math.max(0.18, Math.min(1.12, pitch - (event.clientY - lastMouse.y) * 0.006));
  lastMouse = { x: event.clientX, y: event.clientY };
  updateCamera();
});
renderer.domElement.addEventListener('wheel', event => {
  distance = Math.max(14, Math.min(70, distance + event.deltaY * 0.02));
  updateCamera();
});
updateCamera();

// Ánh sáng
scene.add(new THREE.AmbientLight(0x445544, 0.8));
const dir = new THREE.DirectionalLight(0x9fffc0, 0.6);
dir.position.set(10, 20, 10);
scene.add(dir);

// Nền bãi (grid)
const grid = new THREE.GridHelper(60, 30, 0x1e3a2a, 0x162018);
scene.add(grid);

// Container box geometry/material dùng chung
const boxGeo = new THREE.BoxGeometry(2.4, 2.6, 6);
const edgesGeo = new THREE.EdgesGeometry(boxGeo);

const colors = [0xff7a45, 0x36cfc9, 0xffc53d, 0x9254de, 0x73d13d];

function containerColor(id) {
  let hash = 0;
  for (const c of id) hash += c.charCodeAt(0);
  return colors[hash % colors.length];
}

const BAY_SPACING = 3;
const ROW_SPACING = 7;
const BLOCK_SPACING = 20;
const TIER_HEIGHT = 2.7;

placements.forEach(p => {
  const mat = new THREE.MeshStandardMaterial({
    color: containerColor(p.containerId), metalness: 0.3, roughness: 0.5,
  });
  const mesh = new THREE.Mesh(boxGeo, mat);
  const line = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0x0b0d10 }));
  mesh.add(line);

  mesh.position.set(
    p.block * BLOCK_SPACING + p.bay * BAY_SPACING,
    p.tier * TIER_HEIGHT + 1.3,
    p.row * ROW_SPACING
  );
  scene.add(mesh);
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  if (!dragging) {
    yaw += 0.0012;
    updateCamera();
  }
  renderer.render(scene, camera);
}
animate();
}

function drawFallbackScene() {
  const canvas = document.getElementById('yard-fallback');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = innerWidth * devicePixelRatio;
    canvas.height = innerHeight * devicePixelRatio;
    canvas.style.width = `${innerWidth}px`;
    canvas.style.height = `${innerHeight}px`;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    ctx.fillStyle = '#0b0d10';
    ctx.fillRect(0, 0, innerWidth, innerHeight);
    ctx.strokeStyle = '#1e3a2a';
    for (let x = 0; x < innerWidth; x += 28) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, innerHeight);
      ctx.stroke();
    }
    for (let y = 0; y < innerHeight; y += 28) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(innerWidth, y);
      ctx.stroke();
    }
    placements.forEach((p, index) => {
      const x = 180 + p.block * 260 + p.bay * 56;
      const y = 160 + p.row * 92 - p.tier * 18;
      ctx.fillStyle = `hsl(${[18, 178, 44, 265, 104][index % 5]} 76% 58%)`;
      ctx.fillRect(x, y, 92, 34);
      ctx.strokeStyle = '#07100d';
      ctx.strokeRect(x, y, 92, 34);
      ctx.fillStyle = '#07100d';
      ctx.fillText(p.containerId, x + 8, y + 22);
    });
  }

  addEventListener('resize', resize);
  resize();
}
</script>
</body>
</html>
