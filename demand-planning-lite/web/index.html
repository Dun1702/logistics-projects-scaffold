<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demand Planning Lite</title>
  <link rel="stylesheet" href="../../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="../../index.html"><span class="brand-mark">DP</span><span>Demand Planning Lite</span></a>
      <div class="top-actions">
        <button class="btn" onclick="loadSample()">Dữ liệu mẫu</button>
        <button class="btn primary" onclick="calculate()">Plan reorder</button>
      </div>
    </header>

    <main class="layout workspace">
      <section class="stack">
        <div class="panel">
          <div class="title-row"><h2>SKU policy</h2></div>
          <div class="grid two">
            <label>SKU <input id="sku"></label>
            <label>Method <select id="method"><option value="weighted-moving-average">Weighted moving average</option><option value="moving-average">Moving average</option><option value="exponential-smoothing">Exponential smoothing</option></select></label>
            <label>On hand <input id="onHand" type="number"></label>
            <label>On order <input id="onOrder" type="number"></label>
            <label>Lead time days <input id="leadTime" type="number"></label>
            <label>Review days <input id="reviewDays" type="number"></label>
            <label>Service Z <input id="serviceZ" type="number" step="0.01"></label>
            <label>Pack size <input id="packSize" type="number"></label>
          </div>
        </div>
        <div class="panel">
          <div class="title-row"><h2>Daily demand history</h2></div>
          <textarea id="historyInput"></textarea>
        </div>
      </section>

      <section class="stack">
        <div class="panel">
          <div class="metric-grid">
            <div class="metric"><span>Forecast/day</span><strong id="forecast">-</strong></div>
            <div class="metric"><span>Reorder point</span><strong id="rop">-</strong></div>
            <div class="metric"><span>Order qty</span><strong id="orderQty">-</strong></div>
          </div>
        </div>
        <div class="panel">
          <div class="title-row"><h2>Demand trend</h2><span id="riskBadge" class="status">ready</span></div>
          <canvas id="trendCanvas" class="canvas-box" width="900" height="330"></canvas>
        </div>
        <div class="panel">
          <div class="title-row"><h2>Recommendation</h2></div>
          <div id="resultRows" class="list"></div>
        </div>
      </section>
    </main>
  </div>

<script>
function loadSample() {
  setValues({
    sku: 'SKU-COFFEE-250G',
    onHand: 120,
    onOrder: 40,
    leadTime: 5,
    reviewDays: 7,
    serviceZ: 1.65,
    packSize: 12
  });
  document.getElementById('historyInput').value = '18,20,21,19,23,26,24,25,27,29,28,30';
  calculate();
}

function calculate() {
  const history = document.getElementById('historyInput').value.split(/[\s,]+/).filter(Boolean).map(Number);
  const forecast = forecastDemand(history, document.getElementById('method').value);
  const std = standardDeviation(history);
  const safetyStock = round2(num('serviceZ') * std * Math.sqrt(num('leadTime')));
  const reorderPoint = round2(forecast * num('leadTime') + safetyStock);
  const targetStock = round2(forecast * (num('leadTime') + num('reviewDays')) + safetyStock);
  const inventoryPosition = num('onHand') + num('onOrder');
  const orderQty = Math.ceil(Math.max(0, targetStock - inventoryPosition) / num('packSize')) * num('packSize');
  const risk = inventoryPosition <= safetyStock ? 'high' : inventoryPosition <= reorderPoint ? 'medium' : 'low';
  document.getElementById('forecast').textContent = forecast;
  document.getElementById('rop').textContent = reorderPoint;
  document.getElementById('orderQty').textContent = orderQty;
  document.getElementById('riskBadge').textContent = `${risk} risk`;
  document.getElementById('riskBadge').className = `status ${risk === 'low' ? 'ok' : risk === 'medium' ? 'warn' : 'bad'}`;
  document.getElementById('resultRows').innerHTML = [
    ['Demand std dev', round2(std)],
    ['Safety stock', safetyStock],
    ['Target stock', targetStock],
    ['Inventory position', inventoryPosition],
    ['Days of cover', round2(num('onHand') / Math.max(1, forecast))]
  ].map(([key, value]) => `<div class="list-row"><span>${key}</span><strong>${value}</strong></div>`).join('');
  drawTrend(history, forecast, reorderPoint, inventoryPosition);
}

function forecastDemand(history, method) {
  if (method === 'moving-average') return round2(avg(history.slice(-4)));
  if (method === 'exponential-smoothing') {
    let forecast = history[0];
    history.slice(1).forEach(value => forecast = 0.4 * value + 0.6 * forecast);
    return round2(forecast);
  }
  const window = history.slice(-5);
  const weighted = window.reduce((sum, value, index) => sum + value * (index + 1), 0);
  const weights = window.reduce((sum, _, index) => sum + index + 1, 0);
  return round2(weighted / weights);
}

function drawTrend(history, forecast, reorderPoint, inventoryPosition) {
  const canvas = document.getElementById('trendCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pad = 42;
  const values = history.concat([forecast, reorderPoint / Math.max(1, num('leadTime')), inventoryPosition / Math.max(1, num('leadTime'))]);
  const max = Math.max(...values) * 1.15;
  const x = index => pad + index / Math.max(1, history.length - 1) * (canvas.width - pad * 2);
  const y = value => canvas.height - pad - value / max * (canvas.height - pad * 2);
  ctx.strokeStyle = '#d8dfdc';
  for (let i = 0; i < 5; i++) {
    const gy = pad + i * (canvas.height - pad * 2) / 4;
    ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(canvas.width - pad, gy); ctx.stroke();
  }
  ctx.strokeStyle = '#137c63';
  ctx.lineWidth = 3;
  ctx.beginPath();
  history.forEach((value, index) => index === 0 ? ctx.moveTo(x(index), y(value)) : ctx.lineTo(x(index), y(value)));
  ctx.stroke();
  history.forEach((value, index) => { ctx.fillStyle = '#137c63'; ctx.beginPath(); ctx.arc(x(index), y(value), 4, 0, Math.PI * 2); ctx.fill(); });
  ctx.strokeStyle = '#a65f00';
  ctx.setLineDash([8, 6]);
  ctx.beginPath(); ctx.moveTo(pad, y(forecast)); ctx.lineTo(canvas.width - pad, y(forecast)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#17201d';
  ctx.font = '14px system-ui';
  ctx.fillText(`Forecast ${forecast}`, pad + 8, y(forecast) - 8);
}

function standardDeviation(values) {
  const mean = avg(values);
  return Math.sqrt(values.reduce((sum, value) => sum + (value - mean) ** 2, 0) / Math.max(1, values.length - 1));
}
function avg(values) { return values.reduce((sum, value) => sum + value, 0) / values.length; }
function setValues(values) { Object.entries(values).forEach(([id, value]) => document.getElementById(id).value = value); }
function num(id) { return Number(document.getElementById(id).value); }
function round2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
loadSample();
</script>
</body>
</html>
