<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Packing Pro</title>
  <link rel="stylesheet" href="../../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="../../index.html"><span class="brand-mark">CP</span><span>Container Packing Pro</span></a>
      <div class="top-actions">
        <button class="btn" onclick="loadSample()">Dữ liệu mẫu</button>
        <button class="btn primary" onclick="runPlanner()">Tối ưu</button>
      </div>
    </header>

    <main class="layout workspace">
      <section class="stack">
        <div class="panel">
          <div class="title-row"><h2>Container</h2><span class="status">meters / kg</span></div>
          <div class="grid two">
            <label>Dài <input id="length" type="number" value="12" step="0.1"></label>
            <label>Rộng <input id="width" type="number" value="2.35" step="0.01"></label>
            <label>Cao <input id="height" type="number" value="2.39" step="0.01"></label>
            <label>Tải trọng <input id="maxWeight" type="number" value="26000"></label>
          </div>
        </div>

        <div class="panel">
          <div class="title-row">
            <h2>Hàng cần xếp</h2>
            <button class="icon-btn" title="Thêm dòng hàng" onclick="addBoxRow()">+</button>
          </div>
          <div class="table-wrap">
            <table id="boxTable">
              <thead><tr><th>ID</th><th>Dài</th><th>Rộng</th><th>Cao</th><th>Kg</th><th>Stop</th><th></th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="title-row"><h2>Route giao hàng</h2><span class="status">lat/lng</span></div>
          <textarea id="stopsInput"></textarea>
        </div>
      </section>

      <section class="stack">
        <div class="panel">
          <div class="metric-grid">
            <div class="metric"><span>Utilization</span><strong id="utilization">-</strong></div>
            <div class="metric"><span>Weight used</span><strong id="weightUsed">-</strong></div>
            <div class="metric"><span>Distance</span><strong id="distance">-</strong></div>
          </div>
        </div>

        <div class="panel">
          <div class="title-row"><h2>Sơ đồ xếp hàng</h2><span id="packStatus" class="status">ready</span></div>
          <canvas id="packingCanvas" class="canvas-box" width="900" height="360"></canvas>
        </div>

        <div class="panel">
          <div class="title-row"><h2>Chi tiết</h2></div>
          <div id="details" class="list"></div>
        </div>
      </section>
    </main>
  </div>

<script>
const sampleBoxes = [
  { id: 'Pallet-A', length: 2.4, width: 1.1, height: 1.2, weight: 780, unloadPriority: 3 },
  { id: 'Pallet-B', length: 2.1, width: 1.0, height: 1.4, weight: 660, unloadPriority: 2 },
  { id: 'Pallet-C', length: 1.6, width: 1.2, height: 1.1, weight: 520, unloadPriority: 1 },
  { id: 'Crate-D', length: 1.4, width: 1.0, height: 0.9, weight: 240, unloadPriority: 1 },
  { id: 'Crate-E', length: 1.8, width: 1.2, height: 1.0, weight: 310, unloadPriority: 2 },
];

const sampleStops = [
  { id: 'Depot', lat: 10.7769, lng: 106.7009 },
  { id: 'Customer A', lat: 10.8200, lng: 106.6297 },
  { id: 'Customer B', lat: 10.7626, lng: 106.6602 },
  { id: 'Customer C', lat: 10.8497, lng: 106.7720 }
];

function loadSample() {
  document.querySelector('#boxTable tbody').innerHTML = '';
  sampleBoxes.forEach(addBoxRow);
  document.getElementById('stopsInput').value = JSON.stringify(sampleStops, null, 2);
  runPlanner();
}

function addBoxRow(box = { id: 'New', length: 1, width: 1, height: 1, weight: 100, unloadPriority: 1 }) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td><input value="${box.id}"></td>
    <td><input type="number" step="0.1" value="${box.length}"></td>
    <td><input type="number" step="0.1" value="${box.width}"></td>
    <td><input type="number" step="0.1" value="${box.height}"></td>
    <td><input type="number" value="${box.weight}"></td>
    <td><input type="number" value="${box.unloadPriority}"></td>
    <td><button class="icon-btn danger" title="Xóa dòng" onclick="this.closest('tr').remove()">x</button></td>
  `;
  document.querySelector('#boxTable tbody').appendChild(row);
}

class Container {
  constructor({ id, length, width, height, maxWeight }) {
    this.id = id;
    this.length = length;
    this.width = width;
    this.height = height;
    this.maxWeight = maxWeight;
    this.currentWeight = 0;
    this.placedBoxes = [];
    this.freeSpaces = [{ x: 0, y: 0, z: 0, length, width, height }];
  }
  get usedVolume() { return this.placedBoxes.reduce((s, b) => s + b.length * b.width * b.height, 0); }
  get totalVolume() { return this.length * this.width * this.height; }
  place(box) {
    if (this.currentWeight + box.weight > this.maxWeight) return false;
    const spaces = [...this.freeSpaces].sort((a, b) => box.unloadPriority <= 1 ? a.x - b.x : b.x - a.x);
    const space = spaces.find(s => box.length <= s.length && box.width <= s.width && box.height <= s.height);
    if (!space) return false;
    this.placedBoxes.push({ ...box, position: { x: space.x, y: space.y, z: space.z } });
    this.currentWeight += box.weight;
    this.split(space, box);
    return true;
  }
  split(space, box) {
    this.freeSpaces = this.freeSpaces.filter(s => s !== space);
    if (space.length - box.length > 0) this.freeSpaces.push({ x: space.x + box.length, y: space.y, z: space.z, length: space.length - box.length, width: space.width, height: space.height });
    if (space.width - box.width > 0) this.freeSpaces.push({ x: space.x, y: space.y + box.width, z: space.z, length: box.length, width: space.width - box.width, height: space.height });
    if (space.height - box.height > 0) this.freeSpaces.push({ x: space.x, y: space.y, z: space.z + box.height, length: box.length, width: box.width, height: space.height - box.height });
  }
}

function packContainer(containerSpec, boxes) {
  const container = new Container(containerSpec);
  const unplaced = [];
  [...boxes].sort((a, b) => volume(b) - volume(a)).forEach(box => {
    if (!container.place(box)) unplaced.push(box);
  });
  return { placedBoxes: container.placedBoxes, unplacedBoxes: unplaced, utilization: container.usedVolume / container.totalVolume, totalWeight: container.currentWeight };
}

function runPlanner() {
  const spec = {
    id: 'browser-container',
    length: num('length'),
    width: num('width'),
    height: num('height'),
    maxWeight: num('maxWeight')
  };
  const boxes = [...document.querySelectorAll('#boxTable tbody tr')].map(row => {
    const inputs = row.querySelectorAll('input');
    return {
      id: inputs[0].value,
      length: Number(inputs[1].value),
      width: Number(inputs[2].value),
      height: Number(inputs[3].value),
      weight: Number(inputs[4].value),
      unloadPriority: Number(inputs[5].value)
    };
  });
  const packing = packContainer(spec, boxes);
  const stops = JSON.parse(document.getElementById('stopsInput').value || '[]');
  const route = optimizeRoute(stops);

  document.getElementById('utilization').textContent = pct(packing.utilization);
  document.getElementById('weightUsed').textContent = `${packing.totalWeight.toLocaleString()} kg`;
  document.getElementById('distance').textContent = `${route.totalDistanceKm} km`;
  document.getElementById('packStatus').className = `status ${packing.unplacedBoxes.length ? 'warn' : 'ok'}`;
  document.getElementById('packStatus').textContent = packing.unplacedBoxes.length ? `${packing.unplacedBoxes.length} unplaced` : 'packed';

  drawPacking(spec, packing.placedBoxes);
  renderDetails(packing, route);
}

function drawPacking(spec, boxes) {
  const canvas = document.getElementById('packingCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pad = 28;
  const scale = Math.min((canvas.width - pad * 2) / spec.length, (canvas.height - pad * 2) / spec.width);
  ctx.strokeStyle = '#17201d';
  ctx.lineWidth = 2;
  ctx.strokeRect(pad, pad, spec.length * scale, spec.width * scale);
  boxes.forEach((box, index) => {
    const hue = [167, 34, 211, 205, 88][index % 5];
    ctx.fillStyle = `hsl(${hue} 58% 58%)`;
    ctx.strokeStyle = '#17201d';
    ctx.fillRect(pad + box.position.x * scale, pad + box.position.y * scale, box.length * scale, box.width * scale);
    ctx.strokeRect(pad + box.position.x * scale, pad + box.position.y * scale, box.length * scale, box.width * scale);
    ctx.fillStyle = '#17201d';
    ctx.font = '13px system-ui';
    ctx.fillText(box.id, pad + box.position.x * scale + 6, pad + box.position.y * scale + 18);
  });
}

function renderDetails(packing, route) {
  const details = document.getElementById('details');
  details.innerHTML = `
    <div class="list-row"><span>Placed boxes</span><strong>${packing.placedBoxes.length}</strong></div>
    <div class="list-row"><span>Unplaced</span><strong>${packing.unplacedBoxes.map(b => b.id).join(', ') || 'none'}</strong></div>
    <div class="list-row"><span>Route order</span><strong>${route.order.join(' -> ')}</strong></div>
  `;
}

function optimizeRoute(stops) {
  if (stops.length < 2) return { order: stops.map(s => s.id), totalDistanceKm: 0 };
  const route = [0];
  const visited = new Set([0]);
  while (visited.size < stops.length) {
    const last = route.at(-1);
    let best = -1;
    let bestDistance = Infinity;
    stops.forEach((stop, index) => {
      if (visited.has(index)) return;
      const distance = haversine(stops[last], stop);
      if (distance < bestDistance) { best = index; bestDistance = distance; }
    });
    route.push(best);
    visited.add(best);
  }
  let distance = 0;
  for (let index = 0; index < route.length - 1; index++) distance += haversine(stops[route[index]], stops[route[index + 1]]);
  return { order: route.map(index => stops[index].id), totalDistanceKm: round2(distance) };
}

function haversine(a, b) {
  const r = 6371;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
  return r * 2 * Math.asin(Math.sqrt(h));
}

function volume(box) { return box.length * box.width * box.height; }
function num(id) { return Number(document.getElementById(id).value); }
function pct(n) { return `${Math.round(n * 1000) / 10}%`; }
function toRad(deg) { return deg * Math.PI / 180; }
function round2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }

loadSample();
</script>
</body>
</html>
